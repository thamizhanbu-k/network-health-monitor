version: '3.8'

services:
  app:
    build: .
    container_name: health-monitor
    ports:
      - '5000:5000'
    environment:
      - APP_NAME=Network Health Monitor
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - health-network

  redis:
    image: redis:7-alpine
    container_name: health-redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    networks:
      - health-network

  prometheus:
    image: prom/prometheus:latest
    container_name: health-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - health-network

  grafana:
    image: grafana/grafana:latest
    container_name: health-grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - health-network

networks:
  health-network:
    name: health-monitor-network