version: '3.8'

services:
  app:
    build: .
    container_name: health-monitor
    ports:
      - '5000:5000'
    environment:
      - APP_NAME=Network Health Monitor
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: health-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

networks:
  default:
    name: health-monitor-network